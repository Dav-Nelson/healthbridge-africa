name: HealthBridge Africa CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
            
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
                
      - name: Install dependencies
        run: npm install
              
      - name: Run tests
        # 🚀FIX: Explicitly inject the repository secret into the test runner's environment
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm test